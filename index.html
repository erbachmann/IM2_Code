<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hungry but lost</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Detail Overlay -->
    <div id="detail_overlay" class="detail_overlay" style="display: none">
      <div class="detail_content">
        <div class="detail_top">
          <div class="detail_top_text">
            <h2 id="detail_title"></h2>
            <p id="detail_category"></p>
            <p id="detail_kitchen"></p>
            <div class="detail_ingredients">
              <h3>Grocery list</h3>
              <ul id="detail_grocery"></ul>
            </div>
          </div>
          <img id="detail_img" src="" alt="" loading="lazy" />
        </div>
        <div class="detail_instructions">
          <h3>Recipe</h3>
          <ol id="detail_steps"></ol>
        </div>
      </div>
    </div>
    <!-- Favorites Overlay -->
    <div id="fav_overlay" class="fav_overlay" style="display: none">
      <ul id="fav_list" class="fav_list"></ul>
    </div>
    <!--Scrolling Recipe -->
    <header>
      <button class="btn_heart liked">
        <svg viewBox="0 0 63 55">
          <path
            d="M54.9476 7.07267C53.5645 5.68892 51.9223 4.59124 50.1149 3.84232C48.3074 3.09341 46.3701 2.70794 44.4137 2.70794C42.4572 2.70794 40.5199 3.09341 38.7125 3.84232C36.9051 4.59124 35.2629 5.68892 33.8798 7.07267L31.0094 9.94309L28.139 7.07267C25.3452 4.27891 21.556 2.70939 17.6051 2.70939C13.6541 2.70939 9.86493 4.27891 7.07117 7.07267C4.27741 9.86643 2.70789 13.6556 2.70789 17.6066C2.70789 21.5575 4.27741 25.3467 7.07117 28.1405L9.94158 31.0109L31.0094 52.0787L52.0772 31.0109L54.9476 28.1405C56.3313 26.7574 57.429 25.1152 58.1779 23.3077C58.9268 21.5003 59.3123 19.563 59.3123 17.6066C59.3123 15.6501 58.9268 13.7128 58.1779 11.9054C57.429 10.0979 56.3313 8.45577 54.9476 7.07267Z"
          />
        </svg>
      </button>
    </header>
    <main>
      <div class="main_left">
        <img
          src="/assets/Logo-on-plate 1.png"
          alt="clean plate with Text 'Hungry but lost'"
        />
        <div class="main_controls">
          <button id="btn_load_recipe" class="btn_generate">
            <h1>inspire me</h1>
          </button>
          <select id="catecory_kitchen" class="dropdown">
            <option value="all">All catecories</option>
          </select>
        </div>
      </div>
      <div class="main_right">
        <div class="recipe" id="recipe_card" style="display: none">
          <div class="recipe_image-wrapper">
            <img
              id="recipe_img"
              src=""
              alt="Image of the current recepie displayed"
              loading="lazy"
            />
          </div>
          <h2 id="recipe_title"></h2>
          <p id="recipe_category" class="recipe_infos"></p>
          <p id="recipe_kitchen" class="recipe_infos"></p>
          <div class="recipe_actions">
            <button id="btn_like_recipe" class="btn_heart">
              <svg viewBox="0 0 63 55">
                <path
                  d="M54.9476 7.07267C53.5645 5.68892 51.9223 4.59124 50.1149 3.84232C48.3074 3.09341 46.3701 2.70794 44.4137 2.70794C42.4572 2.70794 40.5199 3.09341 38.7125 3.84232C36.9051 4.59124 35.2629 5.68892 33.8798 7.07267L31.0094 9.94309L28.139 7.07267C25.3452 4.27891 21.556 2.70939 17.6051 2.70939C13.6541 2.70939 9.86493 4.27891 7.07117 7.07267C4.27741 9.86643 2.70789 13.6556 2.70789 17.6066C2.70789 21.5575 4.27741 25.3467 7.07117 28.1405L9.94158 31.0109L31.0094 52.0787L52.0772 31.0109L54.9476 28.1405C56.3313 26.7574 57.429 25.1152 58.1779 23.3077C58.9268 21.5003 59.3123 19.563 59.3123 17.6066C59.3123 15.6501 58.9268 13.7128 58.1779 11.9054C57.429 10.0979 56.3313 8.45577 54.9476 7.07267Z"
                />
              </svg>
            </button>
            <button class="btn_details"><h3>Details</h3></button>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
    <script src="js/script.js" type="module"></script>
  </body>
</html>
